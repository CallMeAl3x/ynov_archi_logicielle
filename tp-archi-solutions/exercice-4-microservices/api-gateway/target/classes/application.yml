server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: book-service
          uri: lb://book-service
          predicates:
            - Path=/api/books/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: loan-service
          uri: lb://loan-service
          predicates:
            - Path=/api/loans/**

        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
